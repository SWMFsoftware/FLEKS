name: Performance Test

on:
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  performance-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Force HTTPS for GitHub
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin

      - name: Checkout SWMF Framework
        uses: actions/checkout@v6
        with:
          repository: SWMFsoftware/SWMF
          path: SWMF

      - name: Get AMReX Hash
        id: amrex-hash
        run: |
          echo "hash=$(git ls-remote https://github.com/SWMFsoftware/AMREX.git master | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Cache AMReX
        id: cache-amrex
        uses: actions/cache@v5
        with:
          path: SWMF/util/AMREX
          key: ${{ runner.os }}-amrex-${{ steps.amrex-hash.outputs.hash }}

      - name: Cache SWMF
        id: cache-swmf
        uses: actions/cache@v5
        with:
          path: |
            SWMF
            !SWMF/PC/FLEKS
            !SWMF/util/AMREX
          key: ${{ runner.os }}-swmf-v5-${{ hashFiles('SWMF/Config.pl') }}

      - name: Checkout FLEKS (Current Commit)
        uses: actions/checkout@v6
        with:
          path: SWMF/PC/FLEKS

      - name: Install or Update SWMF Components
        working-directory: SWMF
        run: |
          if [ "${{ steps.cache-swmf.outputs.cache-hit }}" == "true" ]; then
            echo "Cache hit. Updating components..."
            ./share/Scripts/gitall pull
          else
            echo "Cache miss. Installing components..."
          fi
          # Ensure FLEKS is configured, use -o for component options
          ./Config.pl -install=BATSRUS -v=Empty,PC/FLEKS,GM/BATSRUS -o=PC:tp=PBEG

      - name: Cache Standalone Build
        id: cache-standalone
        uses: actions/cache@v5
        with:
          path: SWMF/PC/FLEKS/bin/FLEKS.exe
          key: ${{ runner.os }}-fleks-standalone-${{ hashFiles('SWMF/PC/FLEKS/**/*.cpp', 'SWMF/PC/FLEKS/**/*.h', 'SWMF/PC/FLEKS/**/Makefile*') }}
          restore-keys: |
            ${{ runner.os }}-fleks-standalone-

      - name: Build Standalone FLEKS
        if: steps.cache-standalone.outputs.cache-hit != 'true'
        working-directory: SWMF/PC/FLEKS
        run: |
          ./Config.pl -install=c
          make EXE -j$(nproc)

      - name: Run Standalone Performance Checks
        working-directory: SWMF/PC/FLEKS/tests/test_standalone
        run: |
          ls -lh ../../bin/FLEKS.exe
          ldd ../../bin/FLEKS.exe
          python3 validate_performance.py

      - name: Write Job Summary
        if: always()
        run: |
          if [ -f SWMF/PC/FLEKS/tests/test_standalone/performance_summary.md ]; then
            cat SWMF/PC/FLEKS/tests/test_standalone/performance_summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Post PR Comment
        uses: actions/github-script@v7
        if: always() && github.event.pull_request && (github.event_name == 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          script: |
            const fs = require('fs');
            const perfPath = 'SWMF/PC/FLEKS/tests/test_standalone/performance_summary.md';
            let body = '';
            
            if (fs.existsSync(perfPath)) {
              body += fs.readFileSync(perfPath, 'utf8') + '\n';
            }
            
            if (body) {
              // 1. List existing comments to find one matching our performance report
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              
              const prComment = comments.find(comment => 
                comment.body.includes('### ⚡ Standalone FLEKS Performance Report')
              );
              
              if (prComment) {
                // 2. Update existing comment in place
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: prComment.id,
                  body: body
                });
                console.log('Successfully updated existing PR comment with performance results.');
              } else {
                // 3. Create a new comment if none exists
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: body
                });
                console.log('Successfully created new PR comment with performance results.');
              }
            }
