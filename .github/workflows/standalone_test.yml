name: Standalone Test

on:
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Force HTTPS for GitHub
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin

      - name: Checkout SWMF Framework
        uses: actions/checkout@v6
        with:
          repository: SWMFsoftware/SWMF
          path: SWMF

      - name: Get AMReX Hash
        id: amrex-hash
        run: |
          echo "hash=$(git ls-remote https://github.com/SWMFsoftware/AMREX.git master | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Cache AMReX
        id: cache-amrex
        uses: actions/cache@v5
        with:
          path: SWMF/util/AMREX
          key: ${{ runner.os }}-amrex-${{ steps.amrex-hash.outputs.hash }}

      - name: Cache SWMF
        id: cache-swmf
        uses: actions/cache@v5
        with:
          path: |
            SWMF
            !SWMF/PC/FLEKS
            !SWMF/util/AMREX
          key: ${{ runner.os }}-swmf-v5-${{ hashFiles('SWMF/Config.pl') }}

      - name: Checkout FLEKS (Current Commit)
        uses: actions/checkout@v6
        with:
          path: SWMF/PC/FLEKS

      - name: Install or Update SWMF Components
        working-directory: SWMF
        run: |
          if [ "${{ steps.cache-swmf.outputs.cache-hit }}" == "true" ]; then
            echo "Cache hit. Updating components..."
            ./share/Scripts/gitall pull
          else
            echo "Cache miss. Installing components..."
          fi
          # Ensure FLEKS is configured, use -o for component options
          ./Config.pl -install=BATSRUS -v=Empty,PC/FLEKS,GM/BATSRUS -o=PC:tp=PBEG

      - name: Cache Standalone Build
        id: cache-standalone
        uses: actions/cache@v5
        with:
          path: |
            SWMF/PC/FLEKS/bin/FLEKS.exe
            SWMF/PC/FLEKS/bin/PostIDL.exe
          key: ${{ runner.os }}-fleks-standalone-${{ hashFiles('SWMF/PC/FLEKS/**/*.cpp', 'SWMF/PC/FLEKS/**/*.h', 'SWMF/PC/FLEKS/**/Makefile*') }}
          restore-keys: |
            ${{ runner.os }}-fleks-standalone-

      - name: Build Standalone FLEKS
        if: steps.cache-standalone.outputs.cache-hit != 'true'
        working-directory: SWMF/PC/FLEKS
        run: |
          Config.pl -u=Exo
          make EXE -j$(nproc)
          make PIDL

      - name: Run Standalone FLEKS Tests (Serial)
        id: test-serial
        working-directory: SWMF/PC/FLEKS/tests
        run: |
          ldd ../bin/FLEKS.exe
          python3 validate_tests.py --summary-file summary_serial.md

      - name: Run Standalone FLEKS Tests (Parallel, 2 Procs)
        id: test-parallel
        if: always() && steps.test-serial.outcome != 'skipped'
        working-directory: SWMF/PC/FLEKS/tests
        run: |
          python3 validate_tests.py -n 2 --summary-file summary_parallel.md

      - name: Write Job Summary
        if: always()
        run: |
          {
            echo "### 🧪 Standalone FLEKS Test Results"
            echo ""
            if [ -f SWMF/PC/FLEKS/tests/summary_serial.md ]; then
              echo "#### Serial (1 proc)"
              cat SWMF/PC/FLEKS/tests/summary_serial.md
              echo ""
            fi
            if [ -f SWMF/PC/FLEKS/tests/summary_parallel.md ]; then
              echo "#### Parallel (2 procs)"
              cat SWMF/PC/FLEKS/tests/summary_parallel.md
              echo ""
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Post PR Comment
        uses: actions/github-script@v7
        if: always() && github.event.pull_request && (github.event_name == 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          script: |
            const fs = require('fs');
            const serialPath = 'SWMF/PC/FLEKS/tests/summary_serial.md';
            const parallelPath = 'SWMF/PC/FLEKS/tests/summary_parallel.md';
            let body = '';
            
            if (fs.existsSync(serialPath) || fs.existsSync(parallelPath)) {
              body += '### 🧪 Standalone FLEKS Test Results\n\n';
              
              if (fs.existsSync(serialPath)) {
                body += fs.readFileSync(serialPath, 'utf8') + '\n';
              }
              if (fs.existsSync(parallelPath)) {
                body += fs.readFileSync(parallelPath, 'utf8') + '\n';
              }
            }
            
            if (body) {
              // 1. List existing comments to find one matching our summary prefix
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              
              const prComment = comments.find(comment => 
                comment.body.includes('### 🧪 Standalone FLEKS Test Results')
              );
              
              if (prComment) {
                // 2. Update existing comment in place
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: prComment.id,
                  body: body
                });
                console.log('Successfully updated existing PR comment with correctness results.');
              } else {
                // 3. Create a new comment if none exists
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: body
                });
                console.log('Successfully created new PR comment with correctness results.');
              }
            }
