---
name: Format Check and Build

on:
  push:
    branches: [ "master" ]
  pull_request_target:
    branches: [ "master" ]

jobs:
  style:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout base repository
      uses: actions/checkout@v6
      with:
        repository: ${{ github.repository }}
        token: ${{ secrets.GITHUB_TOKEN }}

    # For pull_request_target, the PR head ref is exposed on the base repo as
    # refs/pull/<number>/head. Fetch it so we format the PR's code (not master)
    # without checking out untrusted fork code directly.
    - name: Fetch and checkout PR head
      if: github.event_name == 'pull_request_target'
      run: |
        git fetch origin "refs/pull/${{ github.event.pull_request.number }}/head:pr-head"
        git checkout pr-head

    - name: Set up tools
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install clang-format==20.1.8 findent

    - name: Run format script
      run: python3 tools/format_all.py

    - name: Auto-commit formatting changes
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: "style: Auto-format code using format_all.py"
        commit_user_name: "github-actions[bot]"
        commit_user_email: "github-actions[bot]@users.noreply.github.com"
