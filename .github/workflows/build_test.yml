name: FLEKS SWMF Integration Test

on:
  # push:
  #   branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Force HTTPS for GitHub
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran g++ libopenmpi-dev openmpi-bin perl python3

      - name: Checkout SWMF Framework
        uses: actions/checkout@v6
        with:
          repository: SWMFsoftware/SWMF
          path: SWMF

      - name: Cache SWMF
        id: cache-swmf
        uses: actions/cache@v5
        with:
          path: |
            SWMF
            !SWMF/PC/FLEKS
          key: ${{ runner.os }}-swmf-v3-${{ hashFiles('SWMF/Config.pl') }}

      - name: Checkout FLEKS (Current Commit)
        uses: actions/checkout@v6
        with:
          path: SWMF/PC/FLEKS

      - name: Install or Update SWMF Components
        working-directory: SWMF
        run: |
          if [ "${{ steps.cache-swmf.outputs.cache-hit }}" == "true" ]; then
            echo "Cache hit. Updating components..."
            ./share/Scripts/gitall pull
            # Ensure FLEKS is configured even on cache hit
            ./Config.pl -v=Empty,PC/FLEKS,GM/BATSRUS -tp=PBEG
          else
            echo "Cache miss. Installing components..."
            ./Config.pl -install
          fi

      - name: Build and Run test16_2d
        working-directory: SWMF
        run: |
          make -j$(nproc) test16_2d

      - name: Verify Test Results
        working-directory: SWMF
        run: |
          if [ -s test16_2d_gmpc.diff ]; then
            echo "::error::Test verification failed! Non-zero diff detected in test16_2d_gmpc.diff"
            cat test16_2d_gmpc.diff
            exit 1
          fi
          echo "Test verification successful! Diff is empty."