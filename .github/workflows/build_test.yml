name: FLEKS SWMF Integration Test

on:
  # push:
  #   branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Force HTTPS for GitHub
        run: git config --global url."https://github.com/".insteadOf git@github.com:

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran g++ libopenmpi-dev openmpi-bin perl python3

      - name: Checkout SWMF Framework
        uses: actions/checkout@v4
        with:
          repository: SWMFsoftware/SWMF
          path: SWMF

      - name: Checkout FLEKS (Current Commit)
        uses: actions/checkout@v4
        with:
          path: SWMF/PC/FLEKS

      - name: Configure and Install SWMF Components
        working-directory: SWMF
        run: |
          ./Config.pl -install

      - name: Build and Run test16_2d
        working-directory: SWMF
        run: |
          make -j$(nproc) test16_2d